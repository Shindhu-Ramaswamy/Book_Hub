<button type="button" onclick="closeFormModal()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;"><i class="ti ti-x"></i></button>
<h3 style="margin-bottom:6px;">Log damage</h3>
<p style="margin-bottom:16px;color:var(--text2);font-size:0.9rem;">Reporting damage for: <strong style="color:var(--text);">{{ book.title }}</strong></p>
<form method="POST" action="{{ url_for('librarian.add_damaged_for', book_id=book.id) }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group"><label>Quantity damaged</label><input type="number" name="quantity" min="1" max="{{ book.total_quantity }}" value="1" required></div>
  <div class="form-group"><label>Notes</label><input type="text" name="notes" placeholder="Describe the damage…"></div>
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button type="submit" class="btn btn-warning">Report damage</button>
    <button type="button" class="btn" onclick="closeFormModal()">Cancel</button>
  </div>
</form>
