{% extends 'base_librarian.html' %}
{% block page_title %}Edit Book{% endblock %}
{% block content %}
<div style="max-width:540px;">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-sm);">
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group"><label>ISBN</label><input type="text" name="isbn" value="{{ book.isbn }}" required></div>
      <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ book.title }}" required></div>
      <div class="form-group"><label>Author</label><input type="text" name="author" value="{{ book.author }}" required></div>
      <div class="form-group">
        <label>Genre</label>
        <select name="genre" required>
          {% for g in genres %}<option value="{{ g }}" {% if g == book.genre %}selected{% endif %}>{{ g }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Total quantity</label><input type="number" name="total_quantity" value="{{ book.total_quantity }}" min="1" required></div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button type="submit" class="btn btn-librarian">Save changes</button>
        <a href="{{ url_for('librarian.book_list') }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
