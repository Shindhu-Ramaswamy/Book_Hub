<button type="button" onclick="closeFormModal()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;"><i class="ti ti-x"></i></button>
<h3 style="margin-bottom:18px;">Edit book</h3>
<form method="POST" action="{{ url_for('librarian.edit_book', book_id=book.id) }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group"><label>ISBN</label><input type="text" value="{{ book.isbn }}" disabled></div>
  <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ book.title }}" required></div>
  <div class="form-group"><label>Author</label><input type="text" name="author" value="{{ book.author }}" required></div>
  <div class="form-group">
    <label>Genre</label>
    <select name="genre" required>
      {% for g in genres %}<option value="{{ g }}" {% if g == book.genre %}selected{% endif %}>{{ g }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-group"><label>Total quantity</label><input type="number" name="total_quantity" value="{{ book.total_quantity }}" min="1" required></div>
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button type="submit" class="btn btn-librarian">Save changes</button>
    <button type="button" class="btn" onclick="closeFormModal()">Cancel</button>
  </div>
</form>
