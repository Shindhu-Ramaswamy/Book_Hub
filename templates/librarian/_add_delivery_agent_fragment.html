<button type="button" onclick="closeFormModal()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;"><i class="ti ti-x"></i></button>
<h3 style="margin-bottom:18px;">Add delivery agent</h3>
<form method="POST" action="{{ url_for('librarian.add_delivery_agent') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group"><label>Name</label><input type="text" name="name" required placeholder="Agent name" autofocus></div>
  <div class="form-group"><label>Phone</label><input type="tel" name="phone" required placeholder="10-digit phone number"></div>
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button type="submit" class="btn btn-librarian">Add agent</button>
    <button type="button" class="btn" onclick="closeFormModal()">Cancel</button>
  </div>
</form>
