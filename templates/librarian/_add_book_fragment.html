<button type="button" onclick="closeFormModal()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;"><i class="ti ti-x"></i></button>
<h3 style="margin-bottom:18px;">Add book</h3>
<form method="POST" action="{{ url_for('librarian.add_book') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group"><label>ISBN</label><input type="text" name="isbn" required placeholder="978-XXXXXXXXXX" autofocus></div>
  <div class="form-group"><label>Title</label><input type="text" name="title" required placeholder="Book title"></div>
  <div class="form-group"><label>Author</label><input type="text" name="author" required placeholder="Author name"></div>
  <div class="form-group">
    <label>Genre</label>
    <select name="genre" required>
      <option value="" disabled selected>Select a genre</option>
      {% for g in genres %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-group"><label>Total quantity</label><input type="number" name="total_quantity" min="1" value="1" required></div>
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button type="submit" class="btn btn-librarian">Add book</button>
    <button type="button" class="btn" onclick="closeFormModal()">Cancel</button>
  </div>
</form>
