<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — BookHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body class="landing-body">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div class="sidebar-logo" style="background:var(--teal);color:#fff;width:48px;height:48px;font-size:22px;flex-shrink:0;">{% include '_book_stack_icon.html' %}</div>
      <div><h2>Admin login</h2><p class="auth-sub" style="margin:2px 0 0;">System administration access</p></div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="admin@library.com" autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-block" style="background:var(--teal);color:#fff;border-color:var(--teal);margin-top:4px;">Sign in as Admin</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.landing') }}">← Back to home</a></p>
  </div>
</body>
</html>
