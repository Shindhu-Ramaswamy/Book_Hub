<button type="button" onclick="closeFormModal()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;"><i class="ti ti-x"></i></button>
<h3 style="margin-bottom:18px;">Add librarian</h3>
<form method="POST" action="{{ url_for('admin.add_librarian') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group"><label>Full name</label><input type="text" name="name" required placeholder="Librarian name"></div>
  <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="lib@library.com"></div>
  <div class="form-group"><label>Phone</label><input type="tel" name="phone" required placeholder="10-digit number"></div>
  <div class="form-group"><label>Library code</label><input type="text" name="library_code" required placeholder="e.g. LIB-MAIN-01"></div>
  <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Create a password"></div>
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button type="submit" class="btn" style="background:var(--teal);color:#111;border-color:var(--teal);">Create librarian</button>
    <button type="button" class="btn" onclick="closeFormModal()">Cancel</button>
  </div>
</form>
